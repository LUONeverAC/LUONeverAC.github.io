    <script>
        // 初始化功德计数器
        var n = 0;

        // 定义点击按钮时的函数
        function muyi() {
            // 每点击一次，功德加1
            n++;
            // 更新显示的功德值
            document.getElementById("功德显示").innerHTML = "功德：" + n;
        }
    </script>
    <script>
        // 初始化功德计数器
        var 连续增加功德数之和 = 0;

        // 定义点击按钮时的函数
        function dutumuyu() {
            // 生成-n~n之间的随机数
            var 随机数 = Math.floor(Math.random() * (n * 2 + 1)) - n;
            // 如果随机数是负数，使用连续增加功德数之和加上这个负数
            if (随机数 < 0) {
                随机数 += 连续增加功德数之和;
            }
            // 如果连续增加功德数之和大于1000，强制增加-n的功德
            if (连续增加功德数之和 > 10000) {
                随机数 = -n;
                连续增加功德数之和 = 0;
            }
            else if (连续增加功德数之和 > 1000) {
                随机数 = Math.floor(Math.random() * (0 - n + 1)) + n;
                连续增加功德数之和 = 0;
            }
            // 每点击一次，功德增加随机数
            n += 随机数;
            // 更新显示的功德值
            document.getElementById("功德显示").innerHTML = "功德：" + n;
            // 如果随机数是正数，更新连续增加功德数之和
            if (随机数 > 0) {
                连续增加功德数之和 += 随机数;
            } else {
                连续增加功德数之和 = 0;
            }
        }
    </script>

    <p id="功德显示">功德：0</p>

                var timer = setInterval(function () { //添加定时器
                    if (a <= 0) {
                        document.body.removeChild(heart);
                        clearInterval(timer);
                    } else {
                        heart.style.cssText = "font-size:16px;cursor: default;position: fixed;color:" +
                            c + ";left:" + x + "px;top:" + y + "px;opacity:" + a + ";transform:scale(" +
                            s + ");";

                        y--;
                        a -= 0.016;
                        s += 0.002;
                    }
                }, 15)

            }
            // 随机颜色
            function randomColor() {

                return "rgb(" + (~~(Math.random() * 255)) + "," + (~~(Math.random() * 255)) + "," + (~~(Math
                    .random() * 255)) + ")";

            }
        }());
